agent:
  name: "Pod The Trader"
  model: "minimax-m2.7"
  max_iterations_per_turn: 10
  max_tokens: 2048

level5:
  base_url: "https://api.level5.cloud"
  max_daily_spend_usdc: 10.0
  min_balance_threshold_usdc: 0.1

trading:
  target_token_address: "EN2nnxrg8uUi6x2sJkzNPd2eT6rB9rdSoQNNaENA4RZA"
  max_position_size_usdc: 100.0
  max_slippage_bps: 50
  min_trade_size_usdc: 1.0
  max_daily_trades: 20
  cooldown_seconds: 300
  max_price_impact_pct: 5.0

solana:
  # Primary RPC endpoint used for transactions and as the first read
  # attempt. Kept for backwards compatibility — `rpc_urls` below is the
  # authoritative list for reads.
  rpc_url: "https://api.mainnet-beta.solana.com"
  # Prioritized list of read endpoints. Portfolio reads walk this list
  # on every attempt so a rate-limited or unhealthy endpoint can be
  # skipped in favor of a working one. `rpc_url` is prepended
  # automatically if it's not already in the list.
  rpc_urls:
    - "https://solana-mainnet.gateway.tatum.io"
    - "https://api.mainnet.solana.com"
    - "https://solana-rpc.publicnode.com"
  ws_url: "wss://api.mainnet-beta.solana.com"

jupiter:
  quote_url: "https://api.jup.ag/swap/v1"
  price_url: "https://lite-api.jup.ag/price/v3"
  swap_url: "https://api.jup.ag/swap/v1"

polling:
  funding_interval_seconds: 10
  funding_timeout_seconds: 3600
  balance_monitor_interval_seconds: 30
  # Minimum SOL the trading wallet must hold before the bot starts
  # trading. Needed to cover Jupiter swap gas — ~0.000005 SOL per tx
  # plus rent for any new associated token accounts.
  min_wallet_sol: 0.05

logging:
  level: "INFO"
  file: "pod_the_trader.log"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  max_bytes: 52428800
  backup_count: 5

storage:
  base_dir: "~/.pod_the_trader"
